        ,\"Subject\":\"NYC TLC pipeline - echec couche gold\",\"Message.$\":\"States.Format('Echec\
        \ couche gold : {}', $.error)\"},\"Next\":\"GoldFailed\"},\"GoldFailed\":{\"\
