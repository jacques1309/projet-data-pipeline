  SchedulerScheduleNyctlceventbridgestepfunctionpipelinescheduler:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Scheduler::Schedule"
    DeletionPolicy: "Retain"
    Properties:
      GroupName: "default"
      ScheduleExpression: "cron(0 8 * * ? *)"
      Target:
        Input:
          "{\n  \"datasets\": [\n    \"yellow\",\n    \"green\",\n    \"fhvhv\"\
          \n  ],\n  \"datamarts\": [\n    {\n      \"drop\": \"DROP TABLE IF EXISTS\
          \ `nyctlc-glue-database`.gold_revenue_by_zone_hour\",\n      \"prefix\"\
          : \"revenue_by_zone_hour/\",\n      \"ctas\": \"CREATE TABLE gold_revenue_by_zone_hour\
          \ WITH (format='PARQUET', parquet_compression='SNAPPY', external_location='s3://nyctlc-s3-gold/revenue_by_zone_hour/')\
          \ AS SELECT t.service_type, z.borough, z.zone, day_of_week(t.pickup_datetime)\
          \ AS jour_semaine, hour(t.pickup_datetime) AS heure, COUNT(*) AS nb_courses,\
          \ SUM(t.total_amount) AS revenu_total, SUM(t.tip_amount) AS tip_total, SUM(t.trip_distance)\
          \ AS distance_total, SUM(t.trip_duration_sec) AS duree_total_sec, SUM(t.total_amount)/COUNT(*)\
          \ AS revenu_moyen, SUM(t.total_amount)/NULLIF(SUM(t.trip_duration_sec)/60.0,0)\
          \ AS revenu_par_min, SUM(t.tip_amount)/NULLIF(SUM(t.fare_amount),0)*100.0\
          \ AS tip_pct, SUM(t.trip_distance)/COUNT(*) AS distance_moyenne FROM \\\"\
          nyctlc-glue-database\\\".gold_trips_unified t LEFT JOIN \\\"nyctlc-glue-database\\\
          \".\\\"silver-taxi_zones\\\" z ON CAST(t.pu_location_id AS bigint)=z.locationid\
          \ WHERE t.total_amount>0 AND t.trip_duration_sec>0 GROUP BY t.service_type,\
          \ z.borough, z.zone, day_of_week(t.pickup_datetime), hour(t.pickup_datetime)\
          \ HAVING COUNT(*)>=5\"\n    },\n    {\n      \"drop\": \"DROP TABLE IF EXISTS\
          \ `nyctlc-glue-database`.gold_service_comparison\",\n      \"prefix\": \"\
          service_comparison/\",\n      \"ctas\": \"CREATE TABLE gold_service_comparison\
          \ WITH (format='PARQUET', parquet_compression='SNAPPY', external_location='s3://nyctlc-s3-gold/service_comparison/')\
          \ AS WITH base AS (SELECT t.service_type, z.borough, COUNT(*) AS nb_courses,\
          \ APPROX_PERCENTILE(t.total_amount,0.5) AS panier_median, SUM(t.tip_amount)/NULLIF(SUM(t.fare_amount),0)*100.0\
          \ AS tip_pct, CASE WHEN t.service_type='fhvhv' THEN SUM(t.driver_pay)/NULLIF(SUM(t.total_amount),0)*100.0\
          \ ELSE NULL END AS driver_share_pct FROM \\\"nyctlc-glue-database\\\".gold_trips_unified\
          \ t LEFT JOIN \\\"nyctlc-glue-database\\\".\\\"silver-taxi_zones\\\" z ON\
          \ CAST(t.pu_location_id AS bigint)=z.locationid WHERE t.total_amount>0 GROUP\
          \ BY t.service_type, z.borough HAVING COUNT(*)>=5) SELECT service_type,\
          \ borough, nb_courses, nb_courses*100.0/SUM(nb_courses) OVER (PARTITION\
          \ BY borough) AS part_marche_pct, panier_median, tip_pct, driver_share_pct\
          \ FROM base\"\n    },\n    {\n      \"drop\": \"DROP TABLE IF EXISTS `nyctlc-glue-database`.gold_demand_timeseries\"\
          ,\n      \"prefix\": \"demand_timeseries/\",\n      \"ctas\": \"CREATE TABLE\
          \ gold_demand_timeseries WITH (format='PARQUET', parquet_compression='SNAPPY',\
          \ external_location='s3://nyctlc-s3-gold/demand_timeseries/') AS SELECT\
          \ CAST(t.pickup_datetime AS date) AS date_course, hour(t.pickup_datetime)\
          \ AS heure, day_of_week(t.pickup_datetime) AS jour_semaine, t.service_type,\
          \ COUNT(*) AS nb_courses, SUM(t.trip_distance)/COUNT(*) AS distance_moy,\
          \ SUM(t.trip_duration_sec)/COUNT(*) AS duree_moy_sec, SUM(t.trip_distance)/NULLIF(SUM(t.trip_duration_sec)/3600.0,0)\
          \ AS vitesse_moy_mph FROM \\\"nyctlc-glue-database\\\".gold_trips_unified\
          \ t WHERE t.trip_duration_sec>0 GROUP BY CAST(t.pickup_datetime AS date),\
          \ hour(t.pickup_datetime), day_of_week(t.pickup_datetime), t.service_type\
          \ HAVING COUNT(*)>=5\"\n    },\n    {\n      \"drop\": \"DROP TABLE IF EXISTS\
          \ `nyctlc-glue-database`.gold_od_matrix\",\n      \"prefix\": \"od_matrix/\"\
          ,\n      \"ctas\": \"CREATE TABLE gold_od_matrix WITH (format='PARQUET',\
          \ parquet_compression='SNAPPY', external_location='s3://nyctlc-s3-gold/od_matrix/')\
          \ AS SELECT pz.borough AS pu_borough, dz.borough AS do_borough, t.service_type,\
          \ COUNT(*) AS nb_courses, SUM(t.trip_distance)/COUNT(*) AS distance_moy,\
          \ SUM(t.total_amount)/COUNT(*) AS revenu_moy FROM \\\"nyctlc-glue-database\\\
          \".gold_trips_unified t LEFT JOIN \\\"nyctlc-glue-database\\\".\\\"silver-taxi_zones\\\
          \" pz ON CAST(t.pu_location_id AS bigint)=pz.locationid LEFT JOIN \\\"nyctlc-glue-database\\\
          \".\\\"silver-taxi_zones\\\" dz ON CAST(t.do_location_id AS bigint)=dz.locationid\
          \ WHERE t.total_amount>0 GROUP BY pz.borough, dz.borough, t.service_type\
          \ HAVING COUNT(*)>=5\"\n    }\n  ]\n}"
        Arn: "arn:aws:states:eu-west-3:977237814516:stateMachine:nyctlc-stepfunction-pipeline-orchestrator"
        RetryPolicy:
          MaximumEventAgeInSeconds: 86400
          MaximumRetryAttempts: 0
        RoleArn: "arn:aws:iam::977237814516:role/service-role/nyctlc-iam-role-eventbridge-pipeline-scheduler"
      Description: ""
      State: "DISABLED"
      FlexibleTimeWindow:
        Mode: "FLEXIBLE"
        MaximumWindowInMinutes: 5
      ScheduleExpressionTimezone: "Europe/Paris"
      Name: "nyctlc-eventbridge-stepfunction-pipeline-scheduler"
