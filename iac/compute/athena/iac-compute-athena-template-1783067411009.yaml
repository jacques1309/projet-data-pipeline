Resources:
  AthenaNamedQuery5b8eefbe6e3546f99938a894ca0a6067:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
      WorkGroup: "primary"
      Description: "DATAMART 4 : Grain : pu_borough x do_borough x service_type  k-anonymat\
        \ critique ici (couloirs rares) -> HAVING >= 5."
      QueryString: "CREATE TABLE \"nyctlc-glue-database\".gold_od_matrix\nWITH (\n\
        \    format = 'PARQUET',\n    parquet_compression = 'SNAPPY',\n    external_location\
        \ = 's3://nyctlc-s3-gold/od_matrix/'\n) AS\nSELECT\n    pz.borough       \
        \                        AS pu_borough,\n    dz.borough                  \
        \             AS do_borough,\n    t.service_type,\n    COUNT(*)          \
        \                       AS nb_courses,\n    SUM(t.trip_distance) / COUNT(*)\
        \          AS distance_moy,\n    SUM(t.total_amount)  / COUNT(*)         \
        \ AS revenu_moy\nFROM \"nyctlc-glue-database\".gold_trips_unified t\nLEFT\
        \ JOIN \"nyctlc-glue-database\".\"silver-taxi_zone_lookup_csv\" pz\n     \
        \  ON CAST(t.pu_location_id AS bigint) = pz.locationid\nLEFT JOIN \"nyctlc-glue-database\"\
        .\"silver-taxi_zone_lookup_csv\" dz\n       ON CAST(t.do_location_id AS bigint)\
        \ = dz.locationid\nWHERE t.total_amount > 0\nGROUP BY pz.borough, dz.borough,\
        \ t.service_type\nHAVING COUNT(*) >= 5;\n"
      Name: "od_matrix"
  AthenaNamedQueryE8a0fbb8b0b940e2a2cf6d98ffb91f04:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
      WorkGroup: "primary"
      QueryString: "SELECT zone, service_type, SUM(revenu_total) AS revenu\nFROM \"\
        nyctlc-glue-database\".\"gold_revenue_by_zone_hour\"\nWHERE zone = '\"JFK\
        \ Airport\"'\nGROUP BY zone, service_type\nORDER BY revenu DESC;"
      Name: "Revenu par zone et par heure  - verif"
  AthenaNamedQueryE3eca982c24f4345bb10ea31e8b507be:
