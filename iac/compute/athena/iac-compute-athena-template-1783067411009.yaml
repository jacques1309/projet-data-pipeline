  AthenaNamedQuery19d5c425e9cd42ca886019864bfb9e72:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
      WorkGroup: "primary"
      Description: "UNION ALL des 3 services + colonne service_type,  Factorise la\
        \ logique pour que les 4 datamarts lisent une seule source. Une vue ne stocke\
        \ rien (virtuelle) -> zero cout de stockage."
      QueryString: "CREATE OR REPLACE VIEW \"nyctlc-glue-database\".gold_trips_unified\
        \ AS\nSELECT 'yellow' AS service_type, pickup_datetime, dropoff_datetime,\n\
        \       pu_location_id, do_location_id, trip_distance, trip_duration_sec,\n\
        \       fare_amount, tip_amount, total_amount, driver_pay, payment_type,\n\
        \       year, month\nFROM \"nyctlc-glue-database\".\"silver-service_type_yellow\"\
        \nUNION ALL\nSELECT 'green' AS service_type, pickup_datetime, dropoff_datetime,\n\
        \       pu_location_id, do_location_id, trip_distance, trip_duration_sec,\n\
        \       fare_amount, tip_amount, total_amount, driver_pay, payment_type,\n\
        \       year, month\nFROM \"nyctlc-glue-database\".\"silver-service_type_green\"\
        \nUNION ALL\nSELECT 'fhvhv' AS service_type, pickup_datetime, dropoff_datetime,\n\
        \       pu_location_id, do_location_id, trip_distance, trip_duration_sec,\n\
        \       fare_amount, tip_amount, total_amount, driver_pay, payment_type,\n\
        \       year, month\nFROM \"nyctlc-glue-database\".\"silver-service_type_fhvhv\"\
        ;\n"
      Name: "vue_unifiee"
  AthenaNamedQueryF1a7006b3a3244aba496186b2a21b82a:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
