      Name: "check lookup table"
  AthenaNamedQuery94da81e9bded437ea172031084991e99:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
      WorkGroup: "primary"
      Description: " DATAMART 3 : Grain : date x heure x jour_semaine x service_type\
        \  Volumes naturellement >> k=5, mais on garde le filtre par coherence."
      QueryString: "CREATE TABLE \"nyctlc-glue-database\".gold_demand_timeseries\n\
        WITH (\n    format = 'PARQUET',\n    parquet_compression = 'SNAPPY',\n   \
        \ external_location = 's3://nyctlc-s3-gold/demand_timeseries/'\n) AS\nSELECT\n\
        \    CAST(t.pickup_datetime AS date)          AS date_course,\n    hour(t.pickup_datetime)\
        \                  AS heure,\n    day_of_week(t.pickup_datetime)         \
        \  AS jour_semaine,\n    t.service_type,\n    COUNT(*)                   \
        \              AS nb_courses,\n    SUM(t.trip_distance) / COUNT(*)       \
        \   AS distance_moy,\n    SUM(t.trip_duration_sec) / COUNT(*)      AS duree_moy_sec,\n\
        \    -- vitesse moyenne (mph) : distance(miles) / duree(heures)\n    SUM(t.trip_distance)\
        \ / NULLIF(SUM(t.trip_duration_sec)/3600.0, 0) AS vitesse_moy_mph\nFROM \"\
        nyctlc-glue-database\".gold_trips_unified t\nWHERE t.trip_duration_sec > 0\n\
        GROUP BY\n    CAST(t.pickup_datetime AS date),\n    hour(t.pickup_datetime),\n\
        \    day_of_week(t.pickup_datetime),\n    t.service_type\nHAVING COUNT(*)\
        \ >= 5;\n \n"
      Name: "demand_timeseries"
  AthenaNamedQueryC5ff96291d8f4f82b8cb1feb72ca2cd9:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
      WorkGroup: "primary"
      Description: "DATAMART 1 : Grain : service_type x borough x zone x jour_semaine\
        \ x heure   Mesures additives (somme/count) -> moyennes recomposees a la lecture.\
        \   k-anonymat : HAVING nb_courses >= 5."
      QueryString: "CREATE TABLE \"nyctlc-glue-database\".gold_revenue_by_zone_hour\n\
        WITH (\n    format = 'PARQUET',\n    parquet_compression = 'SNAPPY',\n   \
        \ external_location = 's3://nyctlc-s3-gold/revenue_by_zone_hour/'\n) AS\n\
        SELECT\n    t.service_type,\n    z.borough,\n    z.zone,\n    day_of_week(t.pickup_datetime)\
        \            AS jour_semaine,   \n    hour(t.pickup_datetime)            \
        \       AS heure,\n    COUNT(*)                                  AS nb_courses,\n\
        \    SUM(t.total_amount)                       AS revenu_total,\n    SUM(t.tip_amount)\
        \                         AS tip_total,\n    SUM(t.trip_distance)        \
        \              AS distance_total,\n    SUM(t.trip_duration_sec)          \
        \        AS duree_total_sec,\n    SUM(t.total_amount) / COUNT(*)         \
        \   AS revenu_moyen,\n    SUM(t.total_amount) / NULLIF(SUM(t.trip_duration_sec)/60.0,\
        \ 0) AS revenu_par_min,\n    SUM(t.tip_amount)   / NULLIF(SUM(t.fare_amount),\
        \ 0) * 100.0    AS tip_pct,\n    SUM(t.trip_distance) / COUNT(*)         \
        \  AS distance_moyenne\nFROM \"nyctlc-glue-database\".gold_trips_unified t\n\
        LEFT JOIN \"nyctlc-glue-database\".\"silver-taxi_zone_lookup_csv\" z\n   \
        \    ON CAST(t.pu_location_id AS bigint) = z.locationid\nWHERE t.total_amount\
        \ > 0\n  AND t.trip_duration_sec > 0\nGROUP BY\n    t.service_type, z.borough,\
        \ z.zone,\n    day_of_week(t.pickup_datetime), hour(t.pickup_datetime)\nHAVING\
        \ COUNT(*) >= 5\n \n"
      Name: "revenue_by_zone_hour"
  AthenaNamedQuery4e1bb4588b804060bcf811514c32195c:
    UpdateReplacePolicy: "Retain"
    Type: "AWS::Athena::NamedQuery"
    DeletionPolicy: "Retain"
    Properties:
      Database: "nyctlc-glue-database"
      WorkGroup: "primary"
      Description: "DATAMART 2 :  Grain : service_type x borough  Part de marche recomposee\
        \ via window SUM (additif)."
      QueryString: "CREATE TABLE \"nyctlc-glue-database\".gold_service_comparison\n\
        WITH (\n    format = 'PARQUET',\n    parquet_compression = 'SNAPPY',\n   \
        \ external_location = 's3://nyctlc-s3-gold/service_comparison/'\n) AS\nWITH\
        \ base AS (\n    SELECT\n        t.service_type,\n        z.borough,\n   \
        \     COUNT(*)                                       AS nb_courses,\n    \
        \    APPROX_PERCENTILE(t.total_amount, 0.5)         AS panier_median,\n  \
        \      SUM(t.tip_amount) / NULLIF(SUM(t.fare_amount),0) * 100.0 AS tip_pct,\n\
        \        -- exclusif fhvhv : part de la remuneration chauffeur dans le prix\
        \ paye\n        CASE WHEN t.service_type = 'fhvhv'\n             THEN SUM(t.driver_pay)\
        \ / NULLIF(SUM(t.total_amount),0) * 100.0\n             ELSE NULL END    \
        \                         AS driver_share_pct\n    FROM \"nyctlc-glue-database\"\
        .gold_trips_unified t\n    LEFT JOIN \"nyctlc-glue-database\".\"silver-taxi_zone_lookup_csv\"\
        \ z\n           ON CAST(t.pu_location_id AS bigint) = z.locationid\n    WHERE\
        \ t.total_amount > 0\n    GROUP BY t.service_type, z.borough\n    HAVING COUNT(*)\
        \ >= 5\n)\nSELECT\n    service_type,\n    borough,\n    nb_courses,\n    --\
        \ part de marche du service DANS le borough (somme = 100% par borough)\n \
        \   nb_courses * 100.0 / SUM(nb_courses) OVER (PARTITION BY borough) AS part_marche_pct,\n\
        \    panier_median,\n    tip_pct,\n    driver_share_pct\nFROM base;\n"
      Name: "service_comparison"
