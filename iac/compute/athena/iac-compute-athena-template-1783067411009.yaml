        FROM \"nyctlc-glue-database\".\"gold_revenue_by_zone_hour\"\nWHERE zone IN\
        \ ('\"JFK Airport\"', 'LaGuardia Airport')\nGROUP BY heure\nORDER BY heure;"
      Name: "verif_nb_heure"
